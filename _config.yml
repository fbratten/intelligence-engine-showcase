# Intelligence Engine Showcase - Jekyll Configuration

title: Intelligence Engine Showcase
description: AST-driven code knowledge graphs with hybrid search
author: fbratten
baseurl: "/intelligence-engine-showcase"
url: "https://fbratten.github.io"

# Theme - Just the Docs
remote_theme: just-the-docs/just-the-docs
color_scheme: dark

plugins:
  - jekyll-remote-theme

# Mermaid diagram support
mermaid:
  version: "11"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Aux links (top right)
aux_links:
  "View on GitHub":
    - "https://github.com/fbratten/intelligence-engine-showcase"
aux_links_new_tab: true

# Footer
footer_content: "Intelligence Engine Showcase - Code Knowledge Graphs"

# Features
back_to_top: true
back_to_top_text: "Back to top"
enable_copy_code_button: true
heading_anchors: true

# External nav links
nav_external_links:
  - title: Source Code
    url: https://github.com/fbratten/intelligence-engine
    hide_icon: false

# Build settings
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

github:
  repo: fbratten/intelligence-engine-showcase
