title: Intelligence Engine Showcase
description: Domain-agnostic intelligence engine with schema-driven knowledge graphs
baseurl: "/intelligence-engine-showcase"
url: "https://fbratten.github.io"
remote_theme: just-the-docs/just-the-docs
color_scheme: dark
plugins:
  - jekyll-remote-theme
search_enabled: true
aux_links:
  "View on GitHub":
    - "https://github.com/fbratten/intelligence-engine-showcase"
aux_links_new_tab: true
heading_anchors: true
enable_copy_code_button: true
back_to_top: true
mermaid:
  version: "11"
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
