<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IE Tool Selector - Intelligence Engine</title>
<link rel="stylesheet" href="../retro-demo.css">
</head>
<body>
<div class="container">
  <a href="../../" class="back-link">&lt; BACK TO SHOWCASE</a>
  <h1>IE TOOL SELECTOR</h1>
  <p class="subtitle">Answer a few questions to find the right Intelligence Engine tool for your task.</p>
  <div id="app"></div>
</div>
<script>
const tree = {
  id: 'start', question: 'WHAT DO YOU WANT TO DO?', options: [
    { label: 'Search for code', icon: '&#x1F50D;', desc: 'Find functions, classes, or patterns', next: {
      id: 'search', question: 'WHAT KIND OF SEARCH?', options: [
        { label: 'Within one project', icon: '&#x1F4C1;', desc: 'Search a specific project', result: { tool: 'ie_query', desc: 'Search within a single project using hybrid strategies (BM25 + semantic + graph).', example: 'ie_query(project="agent-comm", query="message routing", mode="hybrid")' }},
        { label: 'Across all projects', icon: '&#x1F310;', desc: 'Find something across the entire codebase', result: { tool: 'ie_search_all', desc: 'Cross-project hybrid search across all 54 indexed projects.', example: 'ie_search_all(query="embedding provider", mode="hybrid", limit=20)' }},
        { label: 'Using a graph query', icon: '&#x1F578;', desc: 'Cypher query for structural patterns', result: { tool: 'ie_cypher', desc: 'Run arbitrary Cypher queries against the knowledge graph. Supports all KuzuDB Cypher syntax.', example: 'ie_cypher(project="agent-comm", query="MATCH (n:Entity) WHERE n.entity_type = \'class\' RETURN n.name, n.file LIMIT 20")' }},
      ]
    }},
    { label: 'Analyze code quality', icon: '&#x1F4CA;', desc: 'Metrics, complexity, coverage', next: {
      id: 'quality', question: 'WHAT METRICS DO YOU NEED?', options: [
        { label: 'Quality score & complexity', icon: '&#x1F4C8;', desc: 'Composite score, cyclomatic complexity, doc coverage', result: { tool: 'ie_quality', desc: 'Code quality analysis: composite score, complexity distribution, documentation coverage, function length stats, coupling metrics.', example: 'ie_quality(project="agent-comm")\n# Returns: Score 69.1, CC avg 1.6, max 43, Doc coverage 39.6%' }},
        { label: 'Structural health', icon: '&#x1F3E5;', desc: 'Dead code, cycles, hubs', result: { tool: 'ie_health', desc: 'Health check: dead code detection, circular dependency finder, hub identification, concentration metrics.', example: 'ie_health(project="agent-comm")\n# Returns: 239 dead code, 0 cycles, 12.0% hub concentration' }},
        { label: 'Change impact', icon: '&#x1F4A5;', desc: 'Blast radius of recent changes', result: { tool: 'ie_detect_changes', desc: 'Detect changes since last index and calculate blast radius. Uses git diff to find modified files and traces downstream impact.', example: 'ie_detect_changes(project="agent-comm")\n# Returns: changed files, affected callers, test files to re-run' }},
      ]
    }},
    { label: 'Understand an entity', icon: '&#x1F9EC;', desc: 'Deep dive into a function or class', next: {
      id: 'understand', question: 'WHAT DO YOU WANT TO KNOW?', options: [
        { label: 'Callers & dependencies', icon: '&#x1F517;', desc: 'Who calls this? What does it call?', result: { tool: 'ie_context', desc: 'Full context for an entity: direct callers, callees, blast radius across depth levels.', example: 'ie_context(project="agent-comm", entity="Coordinator")\n# Returns: 3 direct callers, 6 blast radius' }},
        { label: 'AI explanation', icon: '&#x1F916;', desc: 'Natural language summary', result: { tool: 'ie_summarize', desc: 'AI-powered entity summarization using configured LLM provider (Claude, OpenAI, Gemini, or Ollama).', example: 'ie_summarize(project="agent-comm", entity="Coordinator")' }},
        { label: 'Full documentation', icon: '&#x1F4DA;', desc: 'Generate wiki from graph', result: { tool: 'ie_wiki', desc: 'Auto-generate documentation from knowledge graph structure. Creates overview, module breakdown, and relationship documentation.', example: 'ie_wiki(project="agent-comm")' }},
      ]
    }},
    { label: 'Index a project', icon: '&#x1F4E5;', desc: 'Parse source code into the graph', result: { tool: 'ie_index', desc: 'Index a project: parse source code, extract entities and relationships, build search indexes. Supports Python, JS, TS, TSX, Java, Go.', example: 'ie_index(project_path="/path/to/project", project_name="my-project")' }},
    { label: 'Check index status', icon: '&#x1F4CB;', desc: 'See what is indexed', result: { tool: 'ie_status', desc: 'Check indexing status for one or all projects. Shows entity counts, timestamps, graph stats, semantic availability.', example: 'ie_status()  # All projects\nie_status(project="agent-comm")  # Specific project' }},
    { label: 'Batch AI analysis', icon: '&#x26A1;', desc: 'Summarize many entities at once', result: { tool: 'ie_batch_summarize', desc: 'Queue and run AI summarization across multiple entities in a project. Processes in parallel for efficiency.', example: 'ie_batch_summarize(project="agent-comm", entities=["Coordinator", "MessageSpool", "HTTPTransport"])' }},
  ]
};

let path = [];
let current = tree;

function render(node) {
  const app = document.getElementById('app');
  let html = '';
  if (path.length > 0) {
    html += '<div class="breadcrumb">Start' + path.map(p => ' &rarr; <span>' + p + '</span>').join('') + '</div>';
  }
  if (node.result) {
    const r = node.result;
    html += '<div class="retro-result" style="animation: fadeIn 0.3s ease">' +
      '<h2>RECOMMENDED TOOL</h2>' +
      '<div class="tool-name">' + r.tool + '</div>' +
      '<p style="color: var(--retro-text-dim); margin: 12px 0; line-height: 1.6;">' + r.desc + '</p>' +
      '<pre class="retro-pre">' + r.example + '</pre>' +
      '<button class="retro-btn" onclick="restart()">[ START OVER ]</button>' +
      '</div>';
  } else {
    html += '<div class="retro-card" style="animation: fadeIn 0.3s ease">' +
      '<h2>' + node.question + '</h2>' +
      '<div style="margin-top: 16px;">';
    node.options.forEach((opt, i) => {
      html += '<div class="retro-option" onclick="choose(' + i + ')">' +
        '<div class="icon">' + opt.icon + '</div>' +
        '<div><div class="label">' + opt.label + '</div>' +
        '<div class="desc">' + opt.desc + '</div></div></div>';
    });
    html += '</div></div>';
  }
  app.innerHTML = html;
}

function choose(i) {
  const opt = current.options[i];
  path.push(opt.label);
  if (opt.result) { current = opt; render(opt); }
  else if (opt.next) { current = opt.next; render(current); }
}

function restart() { path = []; current = tree; render(current); }
render(current);
</script>
</body>
</html>
