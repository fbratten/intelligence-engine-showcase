<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Search Strategy? - Intelligence Engine</title>
<link rel="stylesheet" href="../retro-demo.css">
</head>
<body>
<div class="container">
  <a href="../../" class="back-link">&lt; BACK TO SHOWCASE</a>
  <h1>WHICH SEARCH STRATEGY?</h1>
  <p class="subtitle">Answer questions to find the best search approach for your query.</p>

  <div id="app">
    <div id="question-container"></div>
    <div id="result-container" style="display:none"></div>
    <div id="history-panel" style="display:none; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--retro-border);">
      <div class="section-title">YOUR PATH</div>
      <div id="history-items"></div>
    </div>
  </div>
</div>
<script>
const questions = [
  { id: 'q1', text: 'WHAT ARE YOU LOOKING FOR?', options: [
    { text: 'Relationships between entities', icon: '&#x1F578;', next: 'result_graph' },
    { text: 'Semantically similar content', icon: '&#x1F9E0;', next: 'result_vector' },
    { text: 'Exact keyword match', icon: '&#x1F50D;', next: 'result_bm25' },
    { text: 'Not sure -- search everything', icon: '&#x1F30C;', next: 'result_all' },
    { text: 'Generate a wiki page', icon: '&#x1F4DA;', next: 'result_wiki' },
  ]},
  { id: 'q_graph_type', text: 'WHAT KIND OF RELATIONSHIP?', options: [
    { text: 'Which projects use which MCP servers', icon: '&#x1F517;', next: 'result_cypher' },
    { text: 'Function call chains', icon: '&#x26D3;', next: 'result_cypher' },
    { text: 'Import dependencies', icon: '&#x1F4E6;', next: 'result_cypher' },
  ]},
];

const results = {
  result_graph: {
    tool: 'ie_query',
    title: 'ie_query (Graph Search)',
    desc: 'Uses Kuzu property graph with Cypher queries. Best for: relationships, dependencies, "which projects use X". 597MB indexed data, structural queries.',
    example: 'ie_query(project="agent-comm", query="transport", mode="hybrid")'
  },
  result_vector: {
    tool: 'ie_search_all',
    title: 'ie_search_all (Vector Search)',
    desc: 'Uses LanceDB with embeddings. Best for: semantic similarity, "find code that does X", natural language queries across all projects.',
    example: 'ie_search_all(query="send data between agents", mode="semantic")'
  },
  result_bm25: {
    tool: 'ie_search_all',
    title: 'ie_search_all (BM25 Full-Text)',
    desc: 'Classic keyword search with BM25 ranking. Best for: exact function names, specific error messages, known identifiers.',
    example: 'ie_search_all(query="HTTPTransport", mode="bm25")'
  },
  result_all: {
    tool: 'ie_search_all',
    title: 'ie_search_all (Triple Search)',
    desc: 'Runs all three strategies in parallel and merges results. Best when you\'re not sure what you\'re looking for -- covers graph + vector + BM25.',
    example: 'ie_search_all(query="message routing", mode="hybrid", limit=20)'
  },
  result_wiki: {
    tool: 'ie_wiki',
    title: 'ie_wiki',
    desc: 'Generates a wiki-style page about any indexed entity. Combines graph relationships, code context, and documentation into a single reference.',
    example: 'ie_wiki(project="agent-comm")'
  },
  result_cypher: {
    tool: 'ie_cypher',
    title: 'ie_cypher (Direct Cypher)',
    desc: 'Write custom Cypher queries against the Kuzu graph. Full power for complex relationship queries, path finding, and aggregations.',
    example: 'ie_cypher(project="agent-comm",\n  query="MATCH (a)-[:CALLS]->(b) RETURN a.name, b.name LIMIT 20")'
  },
};

let history = [];

function showQuestion(qId) {
  const q = questions.find(x => x.id === qId);
  if (!q) return;

  const qc = document.getElementById('question-container');
  const rc = document.getElementById('result-container');
  qc.style.display = 'block';
  rc.style.display = 'none';

  let html = '<div class="retro-card" style="animation: fadeIn 0.3s ease">';
  html += '<h2>' + q.text + '</h2><div style="margin-top: 16px;">';
  q.options.forEach((opt, i) => {
    html += '<div class="retro-option" onclick="selectOption(\'' + q.id + '\',' + i + ')">' +
      '<div class="icon">' + opt.icon + '</div>' +
      '<div><div class="label">' + opt.text + '</div></div></div>';
  });
  html += '</div></div>';
  qc.innerHTML = html;
  updateHistory();
}

function selectOption(qId, idx) {
  const q = questions.find(x => x.id === qId);
  const opt = q.options[idx];
  history.push({ question: q.text, answer: opt.text });

  if (opt.next && opt.next.startsWith('result_')) {
    showResult(opt.next);
  } else {
    showQuestion(opt.next);
  }
}

function showResult(rId) {
  const r = results[rId];
  const qc = document.getElementById('question-container');
  const rc = document.getElementById('result-container');
  qc.style.display = 'none';
  rc.style.display = 'block';

  rc.innerHTML = '<div class="retro-result" style="animation: fadeIn 0.3s ease">' +
    '<h2>RECOMMENDED</h2>' +
    '<div class="tool-name">' + r.tool + '</div>' +
    '<p style="color: var(--retro-text); margin: 8px 0; font-family: Orbitron, sans-serif; font-size: 16px;">' + r.title + '</p>' +
    '<p style="color: var(--retro-text-dim); margin: 12px 0; line-height: 1.6;">' + r.desc + '</p>' +
    '<pre class="retro-pre">' + r.example + '</pre>' +
    '<button class="retro-btn" onclick="restart()">[ START OVER ]</button>' +
    '</div>';
  updateHistory();
}

function updateHistory() {
  const panel = document.getElementById('history-panel');
  const items = document.getElementById('history-items');
  if (history.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  items.innerHTML = history.map(h =>
    '<div style="border-left: 2px solid var(--neon-cyan); padding: 6px 0 6px 12px; margin-bottom: 6px;">' +
    '<div style="font-size: 12px; color: var(--retro-text-dim);">' + h.question + '</div>' +
    '<div style="font-size: 13px; color: var(--neon-cyan);">' + h.answer + '</div></div>'
  ).join('');
}

function restart() {
  history = [];
  showQuestion('q1');
}

showQuestion('q1');
</script>
</body>
</html>
